---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: Instance
metadata:
  name: crossplane-tutorial-ec2
spec:
  forProvider:
    ami: ami-052efd3df9dad4825
    region: eu-west-1
    instanceType: t2.nano
    subnetIdRef:
      name: crossplane-tutorial-public
    tags:
      Name: crossplane-tutorial-ec2
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: InstanceState
metadata:
  name: crossplane-tutorial-ec2-state
spec:
  forProvider:
    region: eu-west-1
    instanceIdRef:
      name: crossplane-tutorial-ec2
    state: running
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPC
metadata:
  name: crossplane-tutorial-vpc
spec:
  forProvider:
    region: eu-west-1
    cidrBlock: 10.0.0.0/16
    enableDnsSupport: true
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: Subnet
metadata:
  name: crossplane-tutorial-public
spec:
  forProvider:
    region: eu-west-1
    availabilityZone: eu-west-1a
    cidrBlock: 10.0.0.0/24
    vpcIdRef:
      name: crossplane-tutorial-vpc
    mapPublicIpOnLaunch: true
